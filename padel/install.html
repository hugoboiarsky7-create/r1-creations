<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Installer Score de Padel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0e0e10; color: #fff;
  font-family: -apple-system, sans-serif;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px;
}
h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
p { font-size: 14px; color: rgba(255,255,255,0.45); margin-bottom: 32px; text-align: center; }
#qr { margin-bottom: 20px; background: #fff; padding: 12px; border-radius: 8px; }
.url { font-size: 11px; color: rgba(255,255,255,0.25); word-break: break-all; text-align: center; max-width: 300px; }
</style>
</head>
<body>
<h1>Score de Padel</h1>
<p>Scanne avec ton Rabbit R1 pour installer.</p>
<div id="qr"></div>
<div class="url" id="url-label"></div>
<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
<script>
  // Bump ?v=N à chaque mise à jour (cache busting du R1)
  var creationUrl = 'https://hugoboiarsky7-create.github.io/r1-creations/padel/?v=1';
  document.getElementById('url-label').textContent = creationUrl;

  var qrData = JSON.stringify({
    title: "Score de Padel",
    url: creationUrl,
    description: "Compteur de score de padel avec historique",
    iconUrl: "",
    themeColor: "#60A5FA"
  });

  // QR classique noir sur blanc : contraste maximal pour la caméra du R1
  var qrCode = new QRCodeStyling({
    width: 260, height: 260,
    margin: 4,
    data: qrData,
    qrOptions: { errorCorrectionLevel: "M" },
    dotsOptions: { color: "#000000", type: "square" },
    backgroundOptions: { color: "#ffffff" },
    cornersSquareOptions: { color: "#000000", type: "square" },
    cornersDotOptions: { color: "#000000" }
  });
  qrCode.append(document.getElementById('qr'));
</script>
</body>
</html>
