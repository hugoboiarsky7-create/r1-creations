<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
<title>Score de Padel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 240px; height: 282px; overflow: hidden;
  background: #0e0e10; color: #fff;
  font-family: -apple-system, sans-serif;
  user-select: none; -webkit-user-select: none;
}
#app { width: 240px; height: 282px; position: relative; }
.screen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; flex-direction: column; }
.screen.visible { display: flex; }

/* ---- setup ---- */
#setup { padding: 12px; gap: 8px; }
#setup h1 { font-size: 15px; font-weight: 800; color: #60A5FA; }
#setup label { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 0.4px; }
#setup input[type=text] {
  width: 100%; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
  color: #fff; font-size: 13px; font-family: inherit; padding: 7px 8px; outline: none;
}
#noad-row { display: flex; align-items: center; gap: 8px; margin-top: 2px; }
#noad-box {
  width: 20px; height: 20px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center; font-size: 13px; color: #60A5FA;
}
#noad-lbl { font-size: 11px; color: rgba(255,255,255,0.7); }
#start {
  margin-top: auto; padding: 12px 0; border-radius: 7px; border: none;
  font-size: 14px; font-weight: 800; font-family: inherit;
  background: #60A5FA; color: #0e0e10;
}

/* ---- match ---- */
#match { }
.half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; }
.half .nm { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.55); letter-spacing: 0.4px; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.half .pt { font-size: 54px; font-weight: 800; line-height: 1.02; font-variant-numeric: tabular-nums; }
.half .gm { font-size: 11px; color: rgba(255,255,255,0.5); font-variant-numeric: tabular-nums; }
#hA .pt { color: #60A5FA; }
#hB .pt { color: #FACC15; }
#mid {
  flex: 0 0 auto; display: flex; align-items: center; justify-content: center; gap: 8px;
  border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 2px 0; font-size: 10px; color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums;
  min-height: 18px;
}
#tb-flag { color: #f87171; font-weight: 800; }

/* ---- fin de match ---- */
#end { align-items: center; justify-content: center; gap: 10px; padding: 16px; text-align: center; }
#end .trophy { font-size: 34px; }
#end .who { font-size: 17px; font-weight: 800; color: #4ade80; }
#end .sc { font-size: 14px; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.8); }
.ebtn {
  padding: 10px 18px; border-radius: 7px; border: none;
  font-size: 12px; font-weight: 800; font-family: inherit; width: 170px;
}
#e-new { background: #60A5FA; color: #0e0e10; }
#e-hist { background: rgba(255,255,255,0.12); color: #fff; }

/* ---- historique ---- */
#hist { }
#hist-hdr { flex: 0 0 auto; display: flex; align-items: baseline; padding: 7px 10px 4px 10px; }
#hist-hdr .t { font-size: 13px; font-weight: 800; color: #60A5FA; letter-spacing: 0.5px; }
#hist-hdr .c { margin-left: auto; font-size: 10px; color: rgba(255,255,255,0.4); }
#hist-clip { flex: 1 1 auto; overflow: hidden; }
#hist-list { transition: transform 0.1s ease-out; }
.hrow { min-height: 24px; padding: 4px 10px; font-size: 11px; display: flex; gap: 6px; align-items: baseline; border-bottom: 1px solid rgba(255,255,255,0.06); }
.hrow .d { color: rgba(255,255,255,0.35); flex: 0 0 auto; font-variant-numeric: tabular-nums; }
.hrow .vs { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hrow .sc { font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.7); }
.hrow.w .vs::before { content: '✔ '; color: #4ade80; }
.hrow.l .vs::before { content: '✘ '; color: #f87171; }
.bilan-hdr { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.4); padding: 6px 10px 2px 10px; letter-spacing: 0.7px; }
#hist-foot {
  flex: 0 0 auto; font-size: 9px; color: rgba(255,255,255,0.3); text-align: center;
  padding: 3px 6px 5px 6px; border-top: 1px solid rgba(255,255,255,0.08);
}
.empty { padding: 26px 20px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); line-height: 1.6; }

#toast {
  display: none; position: absolute; left: 30px; right: 30px; top: 45%; z-index: 60;
  background: rgba(255,255,255,0.14); border-radius: 6px; padding: 7px;
  font-size: 12px; font-weight: 800; text-align: center; backdrop-filter: blur(2px);
}
#toast.visible { display: block; }
</style>
</head>
<body>
<div id="app">

  <div class="screen" id="setup">
    <h1>NOUVEAU MATCH</h1>
    <label>ÉQUIPE A (toi)</label>
    <input type="text" id="in-a" value="Nous">
    <label>ADVERSAIRE (équipe B)</label>
    <input type="text" id="in-b" placeholder="ex : Marc & Léo">
    <div id="noad-row">
      <div id="noad-box"></div>
      <div id="noad-lbl">No-Ad (point en or à 40-40)</div>
    </div>
    <button id="start">COMMENCER</button>
  </div>

  <div class="screen" id="match">
    <div class="half" id="hA">
      <div class="nm" id="nmA"></div>
      <div class="pt" id="ptA">0</div>
      <div class="gm" id="gmA"></div>
    </div>
    <div id="mid"><span id="setsline"></span><span id="tb-flag"></span></div>
    <div class="half" id="hB">
      <div class="nm" id="nmB"></div>
      <div class="pt" id="ptB">0</div>
      <div class="gm" id="gmB"></div>
    </div>
  </div>

  <div class="screen" id="end">
    <div class="trophy">🏆</div>
    <div class="who" id="e-who"></div>
    <div class="sc" id="e-score"></div>
    <button class="ebtn" id="e-new">NOUVEAU MATCH</button>
    <button class="ebtn" id="e-hist">HISTORIQUE</button>
  </div>

  <div class="screen" id="hist">
    <div id="hist-hdr"><span class="t">HISTORIQUE</span><span class="c" id="hist-count"></span></div>
    <div id="hist-clip"><div id="hist-list"></div></div>
    <div id="hist-foot">clic latéral = retour · molette = défiler</div>
  </div>

  <div id="toast"></div>
</div>

<script>
'use strict';
var LSK = { cur: 'pd_current', matches: 'pd_matches' };
var PTS = ['0', '15', '30', '40'];

function load(k, def) {
  try { var v = localStorage.getItem(k); return v === null ? def : JSON.parse(v); }
  catch (e) { return def; }
}
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

var matches = load(LSK.matches, []);  // {d, a, b, sets:[[6,4],...], winner:0|1}
var M = load(LSK.cur, null);          // état du match en cours
var screen = M && !M.done ? 'match' : 'setup';
var histOff = 0;

var $ = function(id) { return document.getElementById(id); };
function esc(s) { return String(s).replace(/[&<>"]/g, function(c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

/* ================= moteur de score ================= */
function newMatch(a, b, noAd) {
  return {
    a: a, b: b, noAd: noAd,
    pts: [0, 0],          // index dans PTS (jeu normal)
    adv: -1,              // -1 aucun, 0/1 avantage
    games: [0, 0],
    sets: [0, 0],
    setHist: [],          // [[6,4],...]
    tiebreak: false,
    tb: [0, 0],
    done: false, winner: -1,
    undo: []              // snapshots
  };
}

function snapshot() {
  return JSON.stringify({ pts: M.pts, adv: M.adv, games: M.games, sets: M.sets, setHist: M.setHist, tiebreak: M.tiebreak, tb: M.tb, done: M.done, winner: M.winner });
}
function pushUndo() {
  M.undo.push(snapshot());
  if (M.undo.length > 60) M.undo.shift();
}
function undo() {
  if (!M || !M.undo.length) { toast('Rien à annuler'); return; }
  var s = JSON.parse(M.undo.pop());
  if (M.done && !s.done && matches.length) {   // on annule le point de match → retirer de l'historique
    matches.pop();
    save(LSK.matches, matches);
  }
  M.pts = s.pts; M.adv = s.adv; M.games = s.games; M.sets = s.sets;
  M.setHist = s.setHist; M.tiebreak = s.tiebreak; M.tb = s.tb;
  M.done = s.done; M.winner = s.winner;
  save(LSK.cur, M);
  if (!M.done && screen === 'end') show('match');
  render();
  toast('Point annulé');
}

function point(t) {           // t = 0 (A) ou 1 (B)
  if (!M || M.done) return;
  pushUndo();
  var o = 1 - t;
  if (M.tiebreak) {
    M.tb[t]++;
    if (M.tb[t] >= 7 && M.tb[t] - M.tb[o] >= 2) {
      M.games[t]++;           // 7-6
      winSet(t);
    }
  } else {
    if (M.pts[t] === 3 && M.pts[o] === 3) {          // 40-40
      if (M.noAd) { winGame(t); }
      else if (M.adv === t) { winGame(t); }
      else if (M.adv === o) { M.adv = -1; }
      else { M.adv = t; }
    } else if (M.pts[t] === 3) {
      winGame(t);
    } else {
      M.pts[t]++;
    }
  }
  save(LSK.cur, M);
  render();
}

function winGame(t) {
  var o = 1 - t;
  M.games[t]++;
  M.pts = [0, 0]; M.adv = -1;
  if (M.games[t] >= 6 && M.games[t] - M.games[o] >= 2) winSet(t);
  else if (M.games[t] === 6 && M.games[o] === 6) { M.tiebreak = true; M.tb = [0, 0]; }
}

function winSet(t) {
  M.sets[t]++;
  M.setHist.push([M.games[0], M.games[1]]);
  M.games = [0, 0]; M.pts = [0, 0]; M.adv = -1;
  M.tiebreak = false; M.tb = [0, 0];
  if (M.sets[t] === 2) {
    M.done = true; M.winner = t;
    matches.push({ d: Date.now(), a: M.a, b: M.b, sets: M.setHist.slice(), winner: t });
    save(LSK.matches, matches);
    save(LSK.cur, M);
    show('end');
  }
}

/* ================= rendu ================= */
function show(s) {
  screen = s;
  ['setup', 'match', 'end', 'hist'].forEach(function(id) {
    $(id).classList.toggle('visible', id === s);
  });
  render();
}

function ptDisplay(t) {
  if (M.tiebreak) return M.tb[t];
  if (M.pts[0] === 3 && M.pts[1] === 3 && M.adv !== -1) {
    return M.adv === t ? 'AV' : '–';
  }
  return PTS[M.pts[t]];
}

function render() {
  if (screen === 'match' && M) {
    $('nmA').textContent = M.a;
    $('nmB').textContent = M.b;
    $('ptA').textContent = ptDisplay(0);
    $('ptB').textContent = ptDisplay(1);
    $('gmA').textContent = 'Jeux ' + M.games[0] + ' · Sets ' + M.sets[0];
    $('gmB').textContent = 'Jeux ' + M.games[1] + ' · Sets ' + M.sets[1];
    var sh = M.setHist.map(function(s) { return s[0] + '-' + s[1]; }).join(' · ');
    $('setsline').textContent = sh || 'Set 1' ;
    $('tb-flag').textContent = M.tiebreak ? 'TIE-BREAK' : '';
  }
  if (screen === 'end' && M && M.done) {
    var w = M.winner === 0 ? M.a : M.b;
    $('e-who').textContent = w;
    $('e-score').textContent = M.setHist.map(function(s) { return s[0] + '-' + s[1]; }).join('  ');
  }
  if (screen === 'hist') renderHist();
}

function renderHist() {
  var list = $('hist-list');
  $('hist-count').textContent = matches.length ? matches.length + ' matchs' : '';
  if (!matches.length) {
    list.innerHTML = '<div class="empty">Aucun match terminé.<br>Les résultats apparaîtront ici.</div>';
    list.style.transform = 'translateY(0)';
    return;
  }
  // bilan par adversaire (nom équipe B)
  var agg = {};
  matches.forEach(function(m) {
    var k = m.b || '?';
    if (!agg[k]) agg[k] = [0, 0];
    agg[k][m.winner === 0 ? 0 : 1]++;
  });
  var html = '<div class="bilan-hdr">BILAN PAR ADVERSAIRE</div>';
  Object.keys(agg).forEach(function(k) {
    html += '<div class="hrow"><span class="vs">' + esc(k) + '</span><span class="sc">' + agg[k][0] + ' V — ' + agg[k][1] + ' D</span></div>';
  });
  html += '<div class="bilan-hdr">MATCHS</div>';
  for (var i = matches.length - 1; i >= 0; i--) {
    var m = matches[i];
    var d = new Date(m.d);
    var ds = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0');
    html += '<div class="hrow ' + (m.winner === 0 ? 'w' : 'l') + '">' +
      '<span class="d">' + ds + '</span>' +
      '<span class="vs">vs ' + esc(m.b) + '</span>' +
      '<span class="sc">' + m.sets.map(function(s) { return s[0] + '-' + s[1]; }).join(' ') + '</span></div>';
  }
  list.innerHTML = html;
  clampHist();
}
function clampHist() {
  var H = $('hist-clip').clientHeight || 220;
  var total = $('hist-list').scrollHeight;
  var maxOff = Math.max(0, total - H);
  histOff = Math.min(maxOff, Math.max(0, histOff));
  $('hist-list').style.transform = 'translateY(-' + histOff + 'px)';
}

var toastT = null;
function toast(t) {
  var el = $('toast');
  el.textContent = t;
  el.classList.add('visible');
  clearTimeout(toastT);
  toastT = setTimeout(function() { el.classList.remove('visible'); }, 1100);
}

/* ================= contrôles ================= */
var noAd = false;
function renderNoAd() { $('noad-box').textContent = noAd ? '✓' : ''; }
$('noad-row').addEventListener('pointerup', function() { noAd = !noAd; renderNoAd(); });

$('start').addEventListener('pointerup', function() {
  var a = $('in-a').value.trim() || 'Nous';
  var b = $('in-b').value.trim() || 'Adversaires';
  $('in-a').blur(); $('in-b').blur();
  M = newMatch(a, b, noAd);
  save(LSK.cur, M);
  show('match');
});

/* tap moitié haute / basse = point ; appui long = annuler */
(function() {
  var t = null, longFired = false;
  var el = $('match');
  el.addEventListener('pointerdown', function() {
    longFired = false;
    t = setTimeout(function() { longFired = true; undo(); }, 650);
  });
  el.addEventListener('pointerup', function(e) {
    clearTimeout(t);
    if (longFired) return;
    point(e.clientY < 141 ? 0 : 1);
  });
  ['pointerleave', 'pointercancel'].forEach(function(ev) {
    el.addEventListener(ev, function() { clearTimeout(t); });
  });
})();

$('e-new').addEventListener('pointerup', function() {
  M = null; localStorage.removeItem(LSK.cur);
  show('setup');
});
$('e-hist').addEventListener('pointerup', function() { histOff = 0; show('hist'); });

/* clic latéral : match/fin ⇄ historique */
window.addEventListener('sideClick', function() {
  if (screen === 'hist') {
    show(M ? (M.done ? 'end' : 'match') : 'setup');
  } else if (screen !== 'setup') {
    histOff = 0; show('hist');
  } else {
    histOff = 0; show('hist');   // depuis setup aussi, pratique
  }
});

/* molette : défiler l'historique (mapping naturel R1) */
window.addEventListener('scrollUp',   function() { if (screen === 'hist') { histOff -= 30; clampHist(); } });
window.addEventListener('scrollDown', function() { if (screen === 'hist') { histOff += 30; clampHist(); } });

/* fallbacks clavier desktop */
document.addEventListener('keydown', function(e) {
  var typing = document.activeElement && document.activeElement.tagName === 'INPUT';
  if (typing) return;
  if (e.key === 'ArrowUp')   window.dispatchEvent(new Event('scrollUp'));
  if (e.key === 'ArrowDown') window.dispatchEvent(new Event('scrollDown'));
  if (e.key === 'Escape')    window.dispatchEvent(new Event('sideClick'));
  if (screen === 'match') {
    if (e.key === 'a') point(0);
    if (e.key === 'b') point(1);
    if (e.key === 'z') undo();
  }
});

renderNoAd();
show(screen);
</script>
</body>
</html>
