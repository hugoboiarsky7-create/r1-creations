<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
<title>Flashcards JP/KR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 240px; height: 282px; overflow: hidden;
  background: #0e0e10; color: #fff;
  font-family: -apple-system, sans-serif;
  user-select: none; -webkit-user-select: none;
}
#app { width: 240px; height: 282px; display: flex; flex-direction: column; position: relative; }
.screen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; flex-direction: column; }
.screen.visible { display: flex; }

/* Choix du paquet */
#decks-hdr { flex: 0 0 auto; display: flex; align-items: baseline; padding: 8px 10px 5px 10px; }
#decks-hdr .t { font-size: 13px; font-weight: 800; color: #C084FC; letter-spacing: 0.5px; }
#fire { margin-left: auto; font-size: 12px; font-weight: 800; }
.deck {
  margin: 3px 10px; padding: 8px 10px; border-radius: 7px; background: rgba(255,255,255,0.05);
  display: flex; align-items: baseline; gap: 6px;
}
.deck.sel { background: rgba(192,132,252,0.12); outline: 1px solid rgba(192,132,252,0.5); }
.deck .dn { font-size: 13px; font-weight: 800; }
.deck .dd { margin-left: auto; font-size: 10px; color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums; }
#decks-hint { margin-top: auto; font-size: 9px; color: rgba(255,255,255,0.3); text-align: center; padding: 5px; border-top: 1px solid rgba(255,255,255,0.08); }

/* Étude */
#study-hdr { flex: 0 0 auto; display: flex; align-items: baseline; gap: 6px; padding: 7px 10px 3px 10px; }
#study-hdr .t { font-size: 11px; font-weight: 800; color: #C084FC; }
#counter { margin-left: auto; font-size: 10px; color: rgba(255,255,255,0.45); font-variant-numeric: tabular-nums; }
#card {
  flex: 1 1 auto; margin: 4px 12px; border-radius: 10px; background: rgba(255,255,255,0.05);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
  padding: 10px; text-align: center;
}
#card.flipped { background: rgba(192,132,252,0.10); }
#c-front { font-size: 30px; font-weight: 800; line-height: 1.25; }
#c-front.small { font-size: 17px; }
#c-back { font-size: 21px; font-weight: 800; color: #C084FC; line-height: 1.3; }
#c-back.small { font-size: 15px; }
#c-roma { font-size: 12px; color: rgba(255,255,255,0.55); }
#c-hint { font-size: 10px; color: rgba(255,255,255,0.3); }
#grade { flex: 0 0 auto; display: none; gap: 6px; padding: 4px 10px 8px 10px; }
#grade.visible { display: flex; }
#grade button { flex: 1; padding: 11px 0; border-radius: 7px; border: none; font-size: 13px; font-weight: 800; font-family: inherit; }
#g-fail { background: rgba(248,113,113,0.22); color: #f87171; }
#g-good { background: rgba(74,222,128,0.22); color: #4ade80; }
#study-hint { flex: 0 0 auto; font-size: 9px; color: rgba(255,255,255,0.3); text-align: center; padding: 0 5px 6px 5px; }
</style>
</head>
<body>
<div id="app">
  <div class="screen visible" id="decks">
    <div id="decks-hdr"><span class="t">FLASHCARDS</span><span id="fire"></span></div>
    <div id="deck-list"></div>
    <div id="decks-hint">molette = choisir · tap ou clic latéral = étudier</div>
  </div>

  <div class="screen" id="study">
    <div id="study-hdr"><span class="t" id="s-deck"></span><span id="counter"></span></div>
    <div id="card">
      <div id="c-front"></div>
      <div id="c-back"></div>
      <div id="c-roma"></div>
      <div id="c-hint">tap = retourner</div>
    </div>
    <div id="grade">
      <button id="g-fail">✘ RATÉ</button>
      <button id="g-good">✔ BON</button>
    </div>
    <div id="study-hint">tap = retourner · molette = passer · clic latéral = retour</div>
  </div>
</div>

var DECKS = [
  { id: 'hira', name: 'Hiragana',      cards: HIRAGANA,  big: true },
  { id: 'kata', name: 'Katakana',      cards: KATAKANA,  big: true },
  { id: 'hang', name: 'Hangul',        cards: HANGUL,    big: true },
  { id: 'pjp',  name: 'Phrases 🇯🇵',    cards: PHRASES_JP, big: false },
  { id: 'pkr',  name: 'Phrases 🇰🇷',    cards: PHRASES_KR, big: false }
];

/* ============ SRS (Leitner) ============
   box 0..4, intervalles en jours ; raté → box 0, bon → box+1 */
var INTERVALS = [0, 1, 3, 7, 16];
var LSK = { prog: 'fc_prog', streak: 'fc_streak', last: 'fc_last' };
function load(k, d) { try { var v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); } catch (e) { return d; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

var prog = load(LSK.prog, {});      // prog[deckId][cardIdx] = {b: box, d: due(ms)}
var streak = load(LSK.streak, 0);
var lastDay = load(LSK.last, null);

var sel = 0, screen = 'decks';
var deck = null, queue = [], qi = 0, flipped = false;

var $ = function(id) { return document.getElementById(id); };
function todayStr() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function yesterdayStr() { var d = new Date(Date.now() - 86400000); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function checkStreakExpiry() {
  if (lastDay !== null && lastDay !== todayStr() && lastDay !== yesterdayStr()) { streak = 0; save(LSK.streak, streak); }
}

function deckStats(d) {
  var p = prog[d.id] || {};
  var due = 0, learnt = 0, now = Date.now();
  for (var i = 0; i < d.cards.length; i++) {
    var e = p[i];
    if (!e) { due++; continue; }             // jamais vue = à faire
    if (e.b >= 2) learnt++;
    if (e.d <= now) due++;
  }
  return { due: due, learnt: learnt };
}

/* ---------------- écrans ---------------- */
function renderDecks() {
  checkStreakExpiry();
  $('fire').textContent = streak > 0 ? '🔥 ' + streak : '';
  var html = '';
  DECKS.forEach(function(d, i) {
    var st = deckStats(d);
    html += '<div class="deck' + (i === sel ? ' sel' : '') + '" data-i="' + i + '">' +
      '<span class="dn">' + d.name + '</span>' +
      '<span class="dd">' + st.due + ' à revoir · ' + st.learnt + '/' + d.cards.length + ' acquises</span></div>';
  });
  $('deck-list').innerHTML = html;
}

function buildQueue() {
  var p = prog[deck.id] || {};
  var now = Date.now();
  var due = [], fresh = [];
  deck.cards.forEach(function(c, i) {
    var e = p[i];
    if (!e) fresh.push(i);
    else if (e.d <= now) due.push(i);
  });
  // mélange léger
  due.sort(function() { return Math.random() - 0.5; });
  fresh.sort(function() { return Math.random() - 0.5; });
  queue = due.concat(fresh).slice(0, 30);   // session de 30 max
  if (!queue.length) {                       // tout est à jour → révision libre
    queue = deck.cards.map(function(_, i) { return i; }).sort(function() { return Math.random() - 0.5; }).slice(0, 20);
  }
  qi = 0;
}

function startStudy() {
  deck = DECKS[sel];
  buildQueue();
  screen = 'study';
  $('decks').classList.remove('visible');
  $('study').classList.add('visible');
  showCard();
}
function backToDecks() {
  screen = 'decks';
  $('study').classList.remove('visible');
  $('decks').classList.add('visible');
  renderDecks();
}

function showCard() {
  if (qi >= queue.length) { backToDecks(); return; }
  flipped = false;
  var c = deck.cards[queue[qi]];
  $('s-deck').textContent = deck.name.toUpperCase();
  $('counter').textContent = (qi + 1) + '/' + queue.length;
  $('c-front').textContent = c[0];
  $('c-front').className = (deck.big || c[0].length <= 3) ? '' : 'small';
  $('c-back').textContent = '';
  $('c-roma').textContent = '';
  $('c-hint').style.display = '';
  $('card').classList.remove('flipped');
  $('grade').classList.remove('visible');
}
function flip() {
  if (flipped) return;
  flipped = true;
  var c = deck.cards[queue[qi]];
  $('c-back').textContent = c[1];
  $('c-back').className = c[1].length > 10 ? 'small' : '';
  $('c-roma').textContent = c[2] || '';
  $('c-hint').style.display = 'none';
  $('card').classList.add('flipped');
  $('grade').classList.add('visible');
}
function grade(good) {
  if (!flipped) return;
  var idx = queue[qi];
  if (!prog[deck.id]) prog[deck.id] = {};
  var e = prog[deck.id][idx] || { b: 0, d: 0 };
  e.b = good ? Math.min(4, e.b + 1) : 0;
  e.d = Date.now() + INTERVALS[e.b] * 86400000 + (e.b === 0 ? 60000 : 0);  // raté → revient dans 1 min
  prog[deck.id][idx] = e;
  save(LSK.prog, prog);
  // streak quotidien
  var t = todayStr();
  if (lastDay !== t) {
    streak = (lastDay === yesterdayStr()) ? streak + 1 : 1;
    lastDay = t;
    save(LSK.streak, streak); save(LSK.last, lastDay);
  }
  if (!good) queue.push(idx);   // les ratées reviennent en fin de session
  qi++;
  showCard();
}

/* ---------------- contrôles ---------------- */
window.addEventListener('scrollUp', function() {
  if (screen === 'decks') { sel = Math.max(0, sel - 1); renderDecks(); }
  else { qi = Math.max(0, qi - 1); showCard(); }
});
window.addEventListener('scrollDown', function() {
  if (screen === 'decks') { sel = Math.min(DECKS.length - 1, sel + 1); renderDecks(); }
  else { qi++; showCard(); }
});
window.addEventListener('sideClick', function() {
  if (screen === 'decks') startStudy();
  else backToDecks();
});

$('deck-list').addEventListener('pointerup', function(e) {
  var row = e.target.closest('.deck');
  if (!row) return;
  var i = parseInt(row.dataset.i, 10);
  if (i === sel) startStudy();
  else { sel = i; renderDecks(); }
});
$('card').addEventListener('pointerup', flip);
$('g-fail').addEventListener('pointerup', function() { grade(false); });
$('g-good').addEventListener('pointerup', function() { grade(true); });

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp')   window.dispatchEvent(new Event('scrollUp'));
  if (e.key === 'ArrowDown') window.dispatchEvent(new Event('scrollDown'));
  if (e.key === 'Escape')    window.dispatchEvent(new Event('sideClick'));
  if (e.key === ' ')         { if (screen === 'study') flip(); else startStudy(); }
  if (e.key === '1') grade(false);
  if (e.key === '2') grade(true);
});

renderDecks();
</script>
</body>
