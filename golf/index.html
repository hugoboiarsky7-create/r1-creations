<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
<title>Golf</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 240px; height: 282px; overflow: hidden;
  background: #0e0e10; color: #fff;
  font-family: -apple-system, sans-serif;
  user-select: none; -webkit-user-select: none;
}
#app { width: 240px; height: 282px; display: flex; flex-direction: column; position: relative; }
.screen { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; flex-direction: column; }
.screen.visible { display: flex; }

/* Setup */
#setup { padding: 12px; gap: 8px; }
#setup h1 { font-size: 15px; font-weight: 800; color: #34D399; }
#setup label { font-size: 10px; color: rgba(255,255,255,0.45); }
#setup input {
  width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: #fff; font-size: 13px; font-family: inherit; padding: 7px 8px; outline: none;
}
.seg { display: flex; gap: 6px; }
.seg button { flex: 1; padding: 8px 0; border-radius: 6px; border: none; font-size: 12px; font-weight: 800; font-family: inherit; background: rgba(255,255,255,0.08); color: #fff; }
.seg button.on { background: #34D399; color: #0e0e10; }
#g-start { margin-top: auto; padding: 12px 0; border-radius: 7px; border: none; font-size: 14px; font-weight: 800; font-family: inherit; background: #34D399; color: #0e0e10; }

/* Jeu */
#play-hdr { flex: 0 0 auto; display: flex; align-items: baseline; gap: 6px; padding: 7px 10px 3px 10px; }
#play-hdr .t { font-size: 11px; font-weight: 800; color: #34D399; max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#vspar { margin-left: auto; font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }
#hole-zone { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
#hole-n { font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
#strokes { font-size: 68px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; }
#par-line { font-size: 13px; color: rgba(255,255,255,0.55); }
#par-line b { color: #34D399; }
#hole-vs { font-size: 13px; font-weight: 800; min-height: 17px; }
.green { color: #4ade80; } .red { color: #f87171; } .grey { color: rgba(255,255,255,0.55); }
#valide { flex: 0 0 auto; margin: 0 10px 6px 10px; padding: 11px 0; border-radius: 7px; border: none; font-size: 13px; font-weight: 800; font-family: inherit; background: rgba(52,211,153,0.2); color: #34D399; }
#play-hint { flex: 0 0 auto; font-size: 9px; color: rgba(255,255,255,0.3); text-align: center; padding: 0 5px 5px 5px; line-height: 1.4; }

/* Historique / fin */
#hist-hdr { flex: 0 0 auto; display: flex; align-items: baseline; padding: 7px 10px 4px 10px; }
#hist-hdr .t { font-size: 13px; font-weight: 800; color: #34D399; }
#hist-hdr .c { margin-left: auto; font-size: 10px; color: rgba(255,255,255,0.4); }
#hist-clip { flex: 1 1 auto; overflow: hidden; }
#hist-list { transition: transform 0.1s ease-out; }
.crs-hdr { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.45); padding: 5px 10px 1px 10px; letter-spacing: 0.5px; }
.crs-hdr .best { color: #FACC15; }
.hrow { min-height: 22px; padding: 3px 10px; font-size: 11px; display: flex; gap: 8px; align-items: baseline; border-bottom: 1px solid rgba(255,255,255,0.05); font-variant-numeric: tabular-nums; }
.hrow .d { color: rgba(255,255,255,0.35); }
.hrow .sc { margin-left: auto; font-weight: 800; }
.empty { padding: 30px 20px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.35); line-height: 1.6; }
.hint { flex: 0 0 auto; font-size: 9px; color: rgba(255,255,255,0.3); text-align: center; padding: 3px 5px 5px 5px; border-top: 1px solid rgba(255,255,255,0.08); }

#end { align-items: center; justify-content: center; gap: 8px; padding: 16px; text-align: center; }
#end .fl { font-size: 32px; }
#end .sc { font-size: 26px; font-weight: 800; }
#end .dt { font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.6; }
.ebtn { padding: 10px 18px; border-radius: 7px; border: none; font-size: 12px; font-weight: 800; font-family: inherit; width: 170px; }

#toast {
  display: none; position: absolute; left: 30px; right: 30px; top: 45%; z-index: 60;
  background: rgba(255,255,255,0.14); border-radius: 6px; padding: 7px;
  font-size: 12px; font-weight: 800; text-align: center;
}
#toast.visible { display: block; }
</style>
</head>
<body>
<div id="app">
  <div class="screen visible" id="setup">
    <h1>⛳ NOUVELLE PARTIE</h1>
    <label>PARCOURS</label>
    <input type="text" id="in-course" placeholder="ex : Golf de Saint-Cloud">
    <label>TROUS</label>
    <div class="seg" id="seg-holes">
      <button data-n="9" class="on">9</button>
      <button data-n="18">18</button>
    </div>
    <label>PAR PAR DÉFAUT (modifiable trou par trou)</label>
    <div class="seg" id="seg-par">
      <button data-p="3">3</button>
      <button data-p="4" class="on">4</button>
      <button data-p="5">5</button>
    </div>
    <button id="g-start">C'EST PARTI</button>
  </div>

  <div class="screen" id="play">
    <div id="play-hdr"><span class="t" id="p-course"></span><span id="vspar"></span></div>
    <div id="hole-zone">
      <div id="hole-n"></div>
      <div id="strokes">0</div>
      <div id="par-line">PAR <b id="p-par">4</b> (tap pour changer)</div>
      <div id="hole-vs"></div>
    </div>
    <button id="valide">VALIDER LE TROU →</button>
    <div id="play-hint">molette = coups · appui long = annuler le dernier coup<br>clic latéral = historique</div>
  </div>

  <div class="screen" id="end">
    <div class="fl">⛳</div>
    <div class="sc" id="e-score"></div>
    <div class="dt" id="e-detail"></div>
    <button class="ebtn" id="e-new" style="background:#34D399;color:#0e0e10">NOUVELLE PARTIE</button>
    <button class="ebtn" id="e-hist" style="background:rgba(255,255,255,0.12);color:#fff">HISTORIQUE</button>
  </div>

  <div class="screen" id="hist">
    <div id="hist-hdr"><span class="t">HISTORIQUE</span><span class="c" id="h-count"></span></div>
    <div id="hist-clip"><div id="hist-list"></div></div>
    <div class="hint">clic latéral = retour · molette = défiler</div>
  </div>

  <div id="toast"></div>
</div>

<script>
'use strict';
var LSK = { cur: 'gf_current', rounds: 'gf_rounds' };
function load(k, d) { try { var v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); } catch (e) { return d; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} }

var rounds = load(LSK.rounds, []);   // {d, course, holes:[{par, strokes}], total, par, vs}
var M = load(LSK.cur, null);         // {course, n, defPar, hi, holes:[{par, strokes}]}
var screen = M ? 'play' : 'setup';
var histOff = 0;
var setupHoles = 9, setupPar = 4;

var $ = function(id) { return document.getElementById(id); };
function esc(s) { return String(s).replace(/[&<>"]/g, function(c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
function vsTxt(v) { return v === 0 ? 'E' : (v > 0 ? '+' + v : String(v)); }
function vsCls(v) { return v === 0 ? 'grey' : (v > 0 ? 'red' : 'green'); }

/* ---------------- écrans ---------------- */
function show(s) {
  screen = s;
  ['setup', 'play', 'end', 'hist'].forEach(function(id) { $(id).classList.toggle('visible', id === s); });
  render();
}

function render() {
  if (screen === 'play' && M) {
    var h = M.holes[M.hi];
    $('p-course').textContent = M.course;
    $('hole-n').textContent = 'TROU ' + (M.hi + 1) + '/' + M.n;
    $('strokes').textContent = h.strokes;
    $('p-par').textContent = h.par;
    // score vs par cumulé sur les trous terminés + trou courant s'il a des coups
    var vs = 0, played = 0;
    M.holes.forEach(function(x, i) {
      if (i < M.hi || (i === M.hi && x.strokes > 0)) { vs += x.strokes - x.par; played++; }
    });
    $('vspar').textContent = vsTxt(vs);
    $('vspar').className = vsCls(vs);
    var hv = h.strokes > 0 ? h.strokes - h.par : null;
    $('hole-vs').textContent = hv === null ? '' : (hv === 0 ? 'Par' : hv === -1 ? 'Birdie 🐦' : hv === -2 ? 'Eagle 🦅' : hv === 1 ? 'Bogey' : hv === 2 ? 'Double bogey' : vsTxt(hv));
    $('hole-vs').className = hv === null ? '' : vsCls(hv);
    $('valide').textContent = M.hi === M.n - 1 ? 'TERMINER LA PARTIE 🏁' : 'VALIDER LE TROU →';
  }
  if (screen === 'hist') renderHist();
}

function renderHist() {
  $('h-count').textContent = rounds.length ? rounds.length + ' parties' : '';
  var el = $('hist-list');
  if (!rounds.length) {
    el.innerHTML = '<div class="empty">Aucune partie terminée.</div>';
    el.style.transform = 'translateY(0)';
    return;
  }
  var byCourse = {};
  rounds.forEach(function(r) { (byCourse[r.course] = byCourse[r.course] || []).push(r); });
  var html = '';
  Object.keys(byCourse).forEach(function(c) {
    var rs = byCourse[c];
    var best = Math.min.apply(null, rs.map(function(r) { return r.vs; }));
    var avg = rs.reduce(function(s, r) { return s + r.vs; }, 0) / rs.length;
    html += '<div class="crs-hdr">' + esc(c).toUpperCase() + ' — <span class="best">record ' + vsTxt(best) + '</span> · moy ' + vsTxt(Math.round(avg)) + '</div>';
    rs.slice().reverse().forEach(function(r) {
      var d = new Date(r.d);
      html += '<div class="hrow"><span class="d">' + String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '</span>' +
        '<span>' + r.holes.length + ' trous · ' + r.total + ' coups</span>' +
        '<span class="sc ' + vsCls(r.vs) + '">' + vsTxt(r.vs) + '</span></div>';
    });
  });
  el.innerHTML = html;
  clampHist();
}
function clampHist() {
  var H = $('hist-clip').clientHeight || 200;
  var total = $('hist-list').scrollHeight;
  histOff = Math.min(Math.max(0, total - H), Math.max(0, histOff));
  $('hist-list').style.transform = 'translateY(-' + histOff + 'px)';
}

var toastT = null;
function toast(t) {
  var el = $('toast');
  el.textContent = t; el.classList.add('visible');
  clearTimeout(toastT);
  toastT = setTimeout(function() { el.classList.remove('visible'); }, 1000);
}

/* ---------------- setup ---------------- */
document.querySelectorAll('#seg-holes button').forEach(function(b) {
  b.addEventListener('pointerup', function() {
    setupHoles = parseInt(b.dataset.n, 10);
    document.querySelectorAll('#seg-holes button').forEach(function(x) { x.classList.toggle('on', x === b); });
  });
});
document.querySelectorAll('#seg-par button').forEach(function(b) {
  b.addEventListener('pointerup', function() {
    setupPar = parseInt(b.dataset.p, 10);
    document.querySelectorAll('#seg-par button').forEach(function(x) { x.classList.toggle('on', x === b); });
  });
});
$('g-start').addEventListener('pointerup', function() {
  var course = $('in-course').value.trim() || 'Parcours';
  $('in-course').blur();
  M = { course: course, n: setupHoles, hi: 0, holes: [] };
  for (var i = 0; i < setupHoles; i++) M.holes.push({ par: setupPar, strokes: 0 });
  save(LSK.cur, M);
  show('play');
});

/* ---------------- jeu ---------------- */
function addStroke(d) {
  if (!M) return;
  var h = M.holes[M.hi];
  h.strokes = Math.max(0, h.strokes + d);
  save(LSK.cur, M);
  render();
}
$('p-par').parentElement.addEventListener('pointerup', function() {
  var h = M.holes[M.hi];
  h.par = h.par === 3 ? 4 : h.par === 4 ? 5 : 3;
  save(LSK.cur, M);
  render();
});
$('valide').addEventListener('pointerup', function() {
  var h = M.holes[M.hi];
  if (h.strokes === 0) { toast('Ajoute des coups à la molette'); return; }
  if (M.hi === M.n - 1) { finishRound(); return; }
  M.hi++;
  save(LSK.cur, M);
  render();
});
function finishRound() {
  var total = 0, par = 0;
  M.holes.forEach(function(h) { total += h.strokes; par += h.par; });
  var r = { d: Date.now(), course: M.course, holes: M.holes, total: total, par: par, vs: total - par };
  rounds.push(r);
  save(LSK.rounds, rounds);
  localStorage.removeItem(LSK.cur);
  $('e-score').textContent = vsTxt(r.vs) + ' (' + total + ' coups)';
  $('e-score').className = 'sc ' + vsCls(r.vs);
  var best = Math.min.apply(null, rounds.filter(function(x) { return x.course === r.course; }).map(function(x) { return x.vs; }));
  $('e-detail').innerHTML = esc(r.course) + ' · ' + M.n + ' trous · par ' + par +
    (r.vs <= best ? '<br>🏆 Record personnel !' : '<br>Record sur ce parcours : ' + vsTxt(best));
  M = null;
  show('end');
}
$('e-new').addEventListener('pointerup', function() { show('setup'); });
$('e-hist').addEventListener('pointerup', function() { histOff = 0; show('hist'); });

/* appui long n'importe où sur la zone de jeu = annuler le dernier coup */
(function() {
  var t = null, longFired = false;
  var el = $('hole-zone');
  el.addEventListener('pointerdown', function() {
    longFired = false;
    t = setTimeout(function() { longFired = true; addStroke(-1); toast('Coup annulé'); }, 600);
  });
  ['pointerup', 'pointerleave', 'pointercancel'].forEach(function(ev) { el.addEventListener(ev, function() { clearTimeout(t); }); });
})();

/* ---------------- molette + clic latéral ---------------- */
window.addEventListener('scrollUp', function() {
  if (screen === 'play') addStroke(-1);
  else if (screen === 'hist') { histOff -= 26; clampHist(); }
});
window.addEventListener('scrollDown', function() {
  if (screen === 'play') addStroke(1);
  else if (screen === 'hist') { histOff += 26; clampHist(); }
});
window.addEventListener('sideClick', function() {
  if (screen === 'hist') show(M ? 'play' : (rounds.length ? 'end' : 'setup'));
  else { histOff = 0; show('hist'); }
});

document.addEventListener('keydown', function(e) {
  var typing = document.activeElement && document.activeElement.tagName === 'INPUT';
  if (typing) return;
  if (e.key === 'ArrowUp')   window.dispatchEvent(new Event('scrollUp'));
  if (e.key === 'ArrowDown') window.dispatchEvent(new Event('scrollDown'));
  if (e.key === 'Escape')    window.dispatchEvent(new Event('sideClick'));
  if (e.key === 'Enter' && screen === 'play') $('valide').dispatchEvent(new PointerEvent('pointerup'));
});

show(screen);
</script>
</body>
</html>
